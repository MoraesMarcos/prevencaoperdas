# ============================================================
# Conexao com o Supabase (PostgreSQL)
# Pegue os dados em: Supabase > Project Settings > Database
# ============================================================

# Opcao A - Conexao direta (Session). Substitua <REF> e a senha.
spring.datasource.url=jdbc:postgresql://db.<SEU-REF>.supabase.co:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=<SUA_SENHA>

# Opcao B - Connection Pooler (recomendado p/ rede IPv4 / serverless).
# Troque a URL acima por esta (porta 5432 = session, 6543 = transaction):
# spring.datasource.url=jdbc:postgresql://aws-0-<REGIAO>.pooler.supabase.com:5432/postgres?sslmode=require
# spring.datasource.username=postgres.<SEU-REF>
# spring.datasource.password=<SUA_SENHA>

spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
# JPA / Hibernate
# validate = NAO altera suas tabelas, so confere se as entidades batem.
# Se der erro de tipo na subida, troque para "none" temporariamente.
# ============================================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Porta da API
server.port=8080
