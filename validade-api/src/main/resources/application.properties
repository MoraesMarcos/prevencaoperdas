# ==============================================================================
# Banco PROPRIO (Supabase) -- onde o app salva produtos e lotes de captura.
# ==============================================================================
app.datasource.jdbc-url=jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:5432/postgres?sslmode=require
app.datasource.username=postgres.dlrjfjgsrrqkvjcnksjm
app.datasource.password=${DB_PASSWORD}
app.datasource.driver-class-name=org.postgresql.Driver
# O pooler do Supabase limita a 15 conexoes; manter o pool pequeno evita estourar.
app.datasource.maximum-pool-size=5
app.datasource.minimum-idle=1
app.datasource.max-lifetime=300000

# ==============================================================================
# Banco da ERP Uniplus (producao) -- SOMENTE LEITURA. Usado para buscar o
# produto pelo codigo de barras (EAN) na hora do bip. Nunca escrever aqui.
# ==============================================================================
erp.datasource.jdbc-url=jdbc:postgresql://mp.serveblog.net:5432/unico
erp.datasource.username=leitura
erp.datasource.password=${ERP_DB_PASSWORD}
erp.datasource.driver-class-name=org.postgresql.Driver
erp.datasource.maximum-pool-size=5
erp.datasource.minimum-idle=1

# Configurações do Hibernate (gerencia apenas o app.datasource)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

server.port=8082

# Expor a mensagem de erro no JSON (diagnostico).
server.error.include-message=always
server.error.include-stacktrace=always
