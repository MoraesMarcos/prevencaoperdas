erp.datasource.jdbc-url=jdbc:postgresql://mp.serveblog.net:5432/unico
erp.datasource.username=leitura
erp.datasource.password=${ERP_DB_PASSWORD}
erp.datasource.driver-class-name=org.postgresql.Driver

# Hibernate so gerencia as entidades do app.datasource (Despesa, Usuario, etc.)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT (login do BI)
jwt.secret=${JWT_SECRET:troque-este-segredo-em-producao-min-32-caracteres}
jwt.expiration-ms=28800000

server.port=8090
